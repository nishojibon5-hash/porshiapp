name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Vite এর রিকোয়ারমেন্ট অনুযায়ী Node.js ২০ এ আপডেট করা হলো
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ক্যাশ ক্লিয়ার করে ফ্রেশ ডিপেন্ডেন্সি ইনস্টল করা
      - name: Install Dependencies
        run: |
          npm ci || npm install
          npm run build --if-present

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # লিন্ট এবং অহেতুক চেক বাদ দিয়ে সরাসরি APK তৈরি
          ./gradlew assembleDebug -x lint -x test --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: porshi-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
