name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          # ক্যাশ এরর এড়ানোর জন্য সাময়িকভাবে ক্যাশ বন্ধ করা হয়েছে

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools-version: 33.0.0

      - name: Install Dependencies
        run: |
          npm install
          npm install -g eas-cli

      - name: Build Android APK (Debug)
        run: |
          # যদি আপনার অ্যান্ড্রয়েড ফাইলগুলো সরাসরি রুট ফোল্ডারে থাকে, তবে 'cd android' দরকার নেই।
          # বর্তমানে আপনার প্রজেক্ট স্ট্রাকচার অনুযায়ী এটি রান করা হচ্ছে।
          if [ -d "android" ]; then cd android; fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: porshi-debug-apk
          path: |
            android/app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/debug/app-debug.apk

      - name: Build Android APK (Release)
        run: |
          if [ -d "android" ]; then cd android; fi
          ./gradlew assembleRelease --stacktrace
        continue-on-error: true

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: porshi-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            app/build/outputs/apk/release/app-release.apk

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - name: Install Dependencies
        run: npm install
      - name: Run Tests
        run: npm test
        continue-on-error: true

  deploy-vercel:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Deploy Backend to Vercel
        run: |
          npm install -g vercel
          vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        continue-on-error: true
