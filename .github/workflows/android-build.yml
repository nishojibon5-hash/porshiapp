name: Build Porshi Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ক্যাশ ক্লিয়ার করে ফ্রেশ ইনস্টল
      - name: Install Dependencies
        run: |
          npm install --legacy-peer-deps
          npm run build --if-present

      # ওয়েব কোডকে অ্যান্ড্রয়েড ফোল্ডারের সাথে সিঙ্ক করা (এটি সবচেয়ে জরুরি)
      - name: Capacitor Sync
        run: |
          npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          # || true বাদ দেওয়া হয়েছে যাতে এরর হলে আপনি সরাসরি দেখতে পান
          ./gradlew assembleDebug -x lint -x test --stacktrace

      # সঠিক পাথ থেকে APK আপলোড করা
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: porshi-apk-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
