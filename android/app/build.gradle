apply plugin: 'com.android.application'

android {
    namespace "com.porshi.app"
    compileSdk 34

    defaultConfig {
        applicationId "com.porshi.app"
        minSdk 22
        targetSdk 34
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    buildTypes {
        debug {
            debuggable true
            minifyEnabled false
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:1.6.1"
    implementation "androidx.coordinatorlayout:coordinatorlayout:1.2.0"
    implementation "androidx.core:core-splashscreen:1.0.1"
    
    // Safely handle Capacitor Android (may not exist)
    try {
        implementation project(':capacitor-android')
    } catch (Exception e) {
        println "⚠️ Capacitor Android not available, skipping..."
    }
    
    // Safely handle Capacitor Cordova plugins
    if (project.hasProperty('capacitor-cordova-android-plugins')) {
        try {
            implementation project(':capacitor-cordova-android-plugins')
        } catch (Exception e) {
            println "⚠️ Capacitor Cordova plugins not available, skipping..."
        }
    }
}
