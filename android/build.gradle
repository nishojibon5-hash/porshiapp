// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    ext {
        // Explicitly set stable versions to avoid variable lookup errors
        minSdkVersion = 24
        targetSdkVersion = 34
        compileSdkVersion = 34
        
        // AndroidX versions (hardcoded to prevent missing variable errors)
        androidxAppCompatVersion = '1.6.1'
        androidxCoreVersion = '1.12.0'
        androidxMaterialVersion = '1.10.0'
        androidxBrowserVersion = '1.7.0'
        androidxLocalbroadcastmanagerVersion = '1.1.0'
        
        // Google Play Services
        googlePlayServicesVersion = '23.0.0'
        
        // Capacitor
        capacitorVersion = '5.5.1'
        capacitorCordovaAndroidVersion = '5.1.1'
        
        // Other dependencies
        cordovaAndroidVersion = '10.1.1'
        junit = '4.13.2'
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        // Force use of com.android.tools.build:gradle:8.2.0
        classpath 'com.android.tools.build:gradle:8.2.0'
        
        // Google Services for Firebase (optional)
        classpath 'com.google.gms:google-services:4.4.0'
        
        // Kotlin
        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.10'
    }
}

plugins {
    id 'com.android.application' version '8.2.0' apply false
    id 'com.android.library' version '8.2.0' apply false
    id 'org.jetbrains.kotlin.android' version '1.9.10' apply false
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }
}

task clean(type: Delete) {
    delete rootProject.buildDir
}

// Hardened configuration to ensure stability
gradle.projectsEvaluated {
    allprojects {
        tasks.withType(JavaCompile) {
            options.compilerArgs << '-Xlint:unchecked'
        }
    }
}
